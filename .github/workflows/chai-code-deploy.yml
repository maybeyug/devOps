name: Deploy Nodejs code on ExCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and push
        run: |
          docker build -t yugsaini/chaicode-node .
          docker push yugsaini/chaicode-node

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.247
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # export NVM_DIR="$HOME/.nvm"
            # [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            # cd /home/ubuntu/devOps
            # git pull
            # npm install
            # pm2 restart 0

            # Kill the existing docker container
            docker rm -f chaicode-node || true

            # Again pull the fresh image from Hub
            docker pull yugsaini/chaicode-node

            # Run docker run -d -p 
            docker run -d --name chaicode-node --restart unless-stopped -p 8000:8000 yugsaini/chaicode-node

            # Clean up old/saved images
            docker image prune -f